steps:
- additivefoam_cube:
    class: solidification_region_reduced
    application: additivefoam
    configure:
      coarse: 160.0e-6
      rx: 0.25e-3
      ry: 0.25e-3
      rz: 200.0e-6
      pad-xy: 1.0e-3
      pad-z: 0.05e-3
      pad-sub: 1.0e-3
      refine-layer: 1
      refine-region: 1
      overwrite: False
    execute:
      batch: True
      overwrite: True
      mpiexec: mpirun
      mpiflags: --bind-to none --oversubscribe
      np: 16
data:
  build:
    datatype: Peregrine
    name: myna_output
    path: ..
    parts:
      P5:
        regions:
          r1:
            layers: [51, 52]
            x: 0.2
            y: 0.022
