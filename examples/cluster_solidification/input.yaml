steps:
- 3dthesis:
    class: solidification_part
    application: thesis
    executable: 3DThesis
    configure:
      res: 50.0e-6
    execute:
      np: 8
      batch: True
- cluster:
    class: cluster_solidification
    application: bnpy
    execute:
      no-training: True
data:
  build:
    datatype: Peregrine
    name: myna_output
    path: ../../resources
    parts:
      P5:
        layers: [51, 52, 53, 54]
