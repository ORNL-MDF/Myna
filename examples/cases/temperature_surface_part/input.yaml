steps:
- 3dthesis:
    class: temperature_surface_part
    application: thesis
    executable: 3DThesis
    configure:
      res: 100.0e-6
      wait: 10.0
    execute:
      np: 1
      batch: True
      use-prior-layer-average: True
data:
  build:
    datatype: Peregrine
    name: myna_output
    path: ../../databases
    parts:
      P5:
        layers: [50, 51, 52, 53, 54]
